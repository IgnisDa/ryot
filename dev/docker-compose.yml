services:
  ryot-redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      retries: 5
      timeout: 5s
      interval: 2s
      test: ["CMD", "redis-cli", "ping"]

  ryot-minio:
    image: minio/minio
    command: server --console-address ":9001" /data
    volumes:
      - ryot_minio_storage:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  ryot-bull-board:
    restart: unless-stopped
    image: venatum/bull-board
    ports:
      - "3002:3000"
    environment:
      REDIS_HOST: ryot-redis
    depends_on:
      ryot-redis:
        condition: service_healthy

  ryot-postgres:
    restart: unless-stopped
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    volumes:
      - ryot_postgres_storage:/var/lib/postgresql
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: postgres -c shared_preload_libraries=pg_stat_statements -c wal_level=logical

volumes:
  ryot_minio_storage:
  ryot_postgres_storage:
